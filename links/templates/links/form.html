{% extends "base.html" %}
{% block title %}{{ action }} — Bookmarks{% endblock %}

{% block content %}
  <section>
    <h1>{{ action }}</h1>

    <form method="post" novalidate>
      {% include "links/_form_include.html" with form=form %}

      <div class="flex-inline">
        <button type="submit">Submit</button>
        <a class="button button--outline" href="{% url 'bookmark_list' slug=user.slug %}">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
