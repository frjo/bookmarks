<h2>{{ action }}</h2>

<form
  method="post"
  action="{{ form_url }}"
  hx-post="{{ form_url }}"
  hx-target="#bookmarks-modal"
  hx-swap="innerHTML"
  novalidate
>
  {% include "links/_form_include.html" with form=form %}

  <div class="flex-inline">
    <button type="submit">Submit</button>
    <button type="button" class="button button--outline" onclick="document.getElementById('bookmarks-modal').close()">Cancel</button>
  </div>
</form>
