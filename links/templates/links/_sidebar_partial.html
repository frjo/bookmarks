{% load i18n %}
<aside
  id="tags"
  class="sidebar layout__second-sidebar"
  hx-get="{% url 'bookmark_tags' slug=user.slug %}"
  hx-trigger="refreshTags from:body"
  hx-swap="outerHTML"
>
  {% if all_tags %}
    <nav class="tag-list">
      <header class="flex-inline flex-inline--baseline">
        <h2>{% trans "Tags" %}</h2>
        {% if all_tags|length > 10 %}
          <input
            type="search"
            id="tag-filter"
            class="tag-filter mb--0"
            placeholder="{% trans 'Filter tags…' %}"
            autocomplete="off"
          >
        {% endif %}
      </header>
      <ul class="meta" id="tag-list">
        {% for t in all_tags %}
          <li data-tag="{{ t }}">
            <a
              href="?tag={{ t }}"
              hx-get="?tag={{ t }}"
              hx-target="#bookmarks"
              hx-swap="outerHTML"
              hx-push-url="true"
            >{{ t }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
    {% if all_tags|length > 10 %}
      <script>
        {
          const input = document.getElementById('tag-filter');
          const items = Array.from(document.querySelectorAll('#tag-list li'));
          input.addEventListener('input', function () {
            const q = this.value.toLowerCase();
            for (const li of items) {
              const show = !q || li.dataset.tag.includes(q);
              if (li.hidden !== !show) li.hidden = !show;
            }
          });
        }
      </script>
    {% endif %}
  {% endif %}
</aside>
