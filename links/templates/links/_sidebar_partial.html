<aside
  id="tags"
  class="sidebar layout__second-sidebar"
  hx-get="{% url 'bookmark_tags' slug=user.slug %}"
  hx-trigger="refreshTags from:body"
  hx-swap="outerHTML"
>
  {% if all_tags %}
    <nav class="tag-list">
      <header class="flex-inline flex-inline--baseline">
        <h2>Tags</h2>
        {% if all_tags|length > 10 %}
          <input
            type="search"
            id="tag-filter"
            class="tag-filter mb--0"
            placeholder="Filter tags…"
            autocomplete="off"
            oninput="
                     const q = this.value.toLowerCase();
                     document.querySelectorAll('#tag-list li').forEach(li => {
                     li.hidden = !li.textContent.toLowerCase().includes(q);
                     });
                    "
          >
        {% endif %}
      </header>
      <ul class="meta" id="tag-list">
        {% for t in all_tags %}
          <li>
            <a
              href="?tag={{ t }}"
              hx-get="?tag={{ t }}"
              hx-target="#bookmarks"
              hx-swap="outerHTML"
              hx-push-url="true"
            >{{ t }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  {% endif %}
</aside>
