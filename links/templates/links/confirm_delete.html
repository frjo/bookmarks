{% extends "base.html" %}
{% block title %}Delete bookmark — Bookmarks{% endblock %}

{% block content %}
  <section>
    <h1>Delete bookmark</h1>

    <p>Are you sure you want to delete this bookmark?</p>

    <p><strong>{{ bookmark.title|default:bookmark.url }}</strong></p>
    <p>{{ bookmark.url }}</p>

    <form method="post" class="flex-inline">
      {% csrf_token %}
      <button type="submit">Yes, delete</button>
      <a class="button button--outline" href="{% url 'bookmark_list' slug=user.slug %}">Cancel</a>
    </form>
  </section>
{% endblock %}
