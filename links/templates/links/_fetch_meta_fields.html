<div>
  <label for="id_title">Title</label>
  <input
    type="text"
    id="id_title"
    name="title"
    value="{{ title }}"
    required
    maxlength="500"
  >
</div>

<div>
  <label for="id_description">Description</label>
  <textarea
    id="id_description"
    name="description"
    rows="6"
    maxlength="2000"
  >{{ description }}</textarea>
</div>
