<h2>Delete bookmark</h2>

<p>Are you sure you want to delete this bookmark?</p>

<p><strong>{{ bookmark.title|default:bookmark.url }}</strong></p>
<p>{{ bookmark.url }}</p>

<form
  method="post"
  action="{{ form_url }}"
  hx-post="{{ form_url }}"
  hx-target="#modal"
  hx-swap="innerHTML"
  class="flex-inline"
>
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
  <button type="button" class="button button--outline" onclick="document.getElementById('bookmarks-modal').close()">Cancel</button>
</form>
